name: Android Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > release-keystore.jks

      - name: Build signed release APK
        env:
          ANDROID_SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:testDebugUnitTest :app:assembleRelease

      - name: Verify release APK signature
        run: |
          apksigner="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "${apksigner}" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          asset_name="a-photo-a-day-release-${short_sha}.apk"
          cp app/build/outputs/apk/release/app-release.apk "${asset_name}"
          {
            echo "short_sha=${short_sha}"
            echo "tag=release-${GITHUB_SHA}"
            echo "asset_name=${asset_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: A Photo a Day ${{ steps.release_meta.outputs.short_sha }}
          files: ${{ steps.release_meta.outputs.asset_name }}
          generate_release_notes: true
